name: CI/CD - Cidades ESG Inteligentes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cidades-esg-app

jobs:

  build-and-test:
    name: "1 - Build e Testes"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flask gunicorn
      - run: python -m unittest tests/test_app.py -v

  docker-build:
    name: "2 - Build da Imagem Docker"
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-staging:
    name: "3 - Deploy Staging"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Redeploy no Railway Staging
        run: |
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceRedeploy(serviceId: \"${{ secrets.RAILWAY_STAGING_SERVICE_ID }}\") }"}'
          echo "Deploy de Staging disparado"
      - name: Health check Staging
        run: |
          sleep 40
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.RAILWAY_STAGING_URL }}/health)
          echo "Health check Staging: $STATUS"

  deploy-producao:
    name: "4 - Deploy Producao"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Redeploy no Railway Producao
        run: |
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceRedeploy(serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\") }"}'
          echo "Deploy de Producao disparado"
      - name: Health check Producao
        run: |
          sleep 40
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.RAILWAY_URL }}/health)
          echo "Health check Producao: $STATUS"
