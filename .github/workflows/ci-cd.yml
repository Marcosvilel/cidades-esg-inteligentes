name: CI/CD — Cidades ESG Inteligentes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cidades-esg-app

jobs:

  build-and-test:
    name: "1 · Build & Testes"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
      - run: pip install flask gunicorn
      - run: python -m unittest tests/test_app.py -v
      - run: |
          APP_ENV=testing python -c "
          from src.app import app
          c = app.test_client()
          r = c.get('/health')
          assert r.status_code == 200
          print('App OK')
          "

  docker-build:
    name: "2 · Build da Imagem Docker"
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-staging:
    name: "3 · Deploy → Staging"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    continue-on-error: true
    steps:
      - name: Verificar secrets de staging
        id: check
        run: |
          if [ -z "${{ secrets.STAGING_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Deploy via SSH
        if: steps.check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/cidades-esg
            docker compose pull app
            docker compose up -d --no-deps app
            curl -f http://localhost:5000/health && echo "Staging OK"
      - name: Deploy ignorado
        if: steps.check.outputs.skip == 'true'
        run: echo "Imagem publicada - servidor de staging nao configurado"

  deploy-producao:
    name: "4 · Deploy → Producao"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Verificar secrets de producao
        id: check
        run: |
          if [ -z "${{ secrets.PROD_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Deploy via SSH
        if: steps.check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/cidades-esg
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps app
            curl -f http://localhost:5000/health && echo "Producao OK"
      - name: Deploy ignorado
        if: steps.check.outputs.skip == 'true'
        run: echo "Imagem publicada - servidor de producao nao configurado"
