name: CI/CD — Cidades ESG Inteligentes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cidades-esg-app

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB 1 ─ BUILD & TEST
  # ════════════════════════════════════════════════════════════
  build-and-test:
    name: "1 · Build & Testes"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install flask gunicorn

      - name: Executar testes
        run: python -m unittest tests/test_app.py -v

      - name: Verificar se app sobe corretamente
        run: |
          APP_ENV=testing python -c "
          from src.app import app
          c = app.test_client()
          r = c.get('/health')
          assert r.status_code == 200, f'Health falhou: {r.status_code}'
          print('App OK')
          "

  # ════════════════════════════════════════════════════════════
  # JOB 2 ─ BUILD DA IMAGEM DOCKER
  # ════════════════════════════════════════════════════════════
  docker-build:
    name: "2 · Build da Imagem Docker"
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ════════════════════════════════════════════════════════════
  # JOB 3 ─ DEPLOY STAGING  (branch develop)
  # ════════════════════════════════════════════════════════════
  deploy-staging:
    name: "3 · Deploy → Staging"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: http://staging.cidades-esg.com

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy via SSH no servidor de Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/cidades-esg
            echo "APP_VERSION=${{ github.sha }}" >> .env
            docker compose pull app
            docker compose up -d --no-deps app
            sleep 10
            curl -f http://localhost:5000/health && echo "Staging OK"

  # ════════════════════════════════════════════════════════════
  # JOB 4 ─ DEPLOY PRODUÇÃO  (branch main)
  # ════════════════════════════════════════════════════════════
  deploy-producao:
    name: "4 · Deploy → Produção"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://cidades-esg.com

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy via SSH no servidor de Produção
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/cidades-esg
            echo "APP_VERSION=${{ github.sha }}" >> .env
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps app
            sleep 15
            curl -f http://localhost:5000/health && echo "Producao OK"
